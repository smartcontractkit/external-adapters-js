    - endpoint: nav
      request: |
        {
          "data": {
            "endpoint": "nav",
            "fundId": 8
          }
        }
      response: |
        {
          "statusCode": 200,
          "result": 105.129,
          "data": {
            "fundId": 8,
            "fundName": "CashPlus_BSC",
            "netAssetValue": 105.129,
            "navDate": "2025-08-26"
          },
          "timestamps": {
            "providerDataRequestedUnixMs": 978347471111,
            "providerDataReceivedUnixMs": 978347471111,
            "providerIndicatedTimeUnixMs": 1756166400000
          }
        }
context: 
    - fundId parameter is required for all requests
    - Latest data point is always first in nav-daily list array